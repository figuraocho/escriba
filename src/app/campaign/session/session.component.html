<form>
  <label for="sessionDate">Fecha:</label>
  <input type="datetime" name="sessionDate" id="sessionDate" class="form-control" [formControl]="sessionDate" >
  <label for="sessionText">Apuntes:</label>
  <textarea name="sessionText" id="sessionText" rows="6" class="form-control"></textarea>
  <br>
  <div style="width: 100%;">
    <button type="button" class="btn btn-danger">Cancelar</button>
    <button type="button" class="btn btn-success" style="float:right;">Guardar</button>
  </div>
</form>
