<div class="row justify-content-center" style="text-align: center; ">
  <h1>Lista de Campañas</h1>
</div>
<div class="row justify-content-center">
  <span class="material-icons md-48">add_box</span>
  <span class="material-icons md-48">exit_to_app</span>
  <span class="material-icons md-48">search</span>
</div>
<div class="row">
  <div *ngFor="let campaign of campaignList;let campaignIndex = index" class="col-12">
    <button class="btn btn-success btn-block" (click)="onToggleContent(campaignIndex)"
      style="margin: 2px;">{{campaign.name}}</button>
    <div class="collapse" id="demo{{campaignIndex}}">
      <p><b>Ambientacion:</b> {{campaign.setting}} <br>
        <b>Sistema:</b> {{campaign.system}}<br>
        <b>Descripcion:</b> {{campaign.description}}
      </p>
      <p>Sessiones anteriores
        <button class="btn btn-primary btn-block" style="margin: 2px;"
          *ngFor="let session of campaign.sessions; let sessionIndex = index"
          (click)="openDialogSession(campaignIndex,sessionIndex)">{{session.date | date:
          'short'}}</button>
      </p>
      <p>Nueva sesion
        <textarea rows="4" class="newSession" style="width: 100%;"></textarea><button
          (click)="onAddSession(campaignIndex)">Add
          Session</button>
      </p>
      <br>
    </div>
  </div>
</div>
